name: Daily Workout Reminder

# Runs at 10:00 UTC = 12:00 CEST (Europe/Warsaw, UTC+2, Apr–Oct)
# In winter (CET, UTC+1) this fires at 11:00 Warsaw time.
on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  remind:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send daily reminder
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          PARTICIPANTS: ${{ secrets.PARTICIPANTS }}
        run: python scripts/send_daily_reminder.py

      - name: Commit updated state
        run: |
          git config user.name "pushup-bot[bot]"
          git config user.email "pushup-bot@users.noreply.github.com"
          git add data/state.json
          git diff --staged --quiet || git commit -m "chore: state after morning reminder [skip ci]"
          git push
